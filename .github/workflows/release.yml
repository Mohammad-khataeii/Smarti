name: Build and Publish Smarti

on:
  push:
    tags:
      - 'v*'   # runs when you push a version tag (e.g., v1.0.1)

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]  # build on both mac & windows

    steps:
      - name: 🧩 Checkout repo
        uses: actions/checkout@v4

      - name: 🧠 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build and Publish with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish
